<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Real</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
        <div id="setup" class="container">
            <h2>Configurar usuario</h2>

            <input id="nombre" placeholder="Nombre" autocomplete="off">
            <input id="peso" type="number" placeholder="Peso (kg)">
            <input id="objetivo" type="number" placeholder="Calorías objetivo">
            <input id="mantenimiento" type="number" placeholder="Calorías mantenimiento">

            <button id="guardarUsuario">Guardar</button>
        </div>

        <div id="app" style="display: none;">

            <div class="header">
                <h1>Fitness Real</h1>
                <p id="fechaHoy"></p>
            </div>

            <div class="container">
                <h3>Estado</h3>
                <p id="restantes"></p>
                <p id="estadoCalorias" class="estado"></p>
            </div>

            <div class="container">
                <h3>Registrar comida</h3>
                <select id="alimento">
                    <option value="arroz">Arroz integral</option>
                    <option value="huevo">Huevo</option>
                    <option value="pollo">Pechuga de pollo</option>
                    <option value="contramuslo">Contramuslo</option>
                    <option value="lomo">Lomo de cerdo</option>
                    <option value="atun">Atún</option>
                    <option value="yogurt">Yogur proteico</option>
                    <option value="aceite">Aceite de oliva</option>
                </select>

                <input id="gramos" type="number" placeholder="Gramos" min="1">

                <button id="btnAgregar">Añadir comida</button>
            </div>

            <div class="container">
                <h3>Resumen de hoy</h3>
                <p id="totalCalorias">Calorías: 0</p>
                <p id="totalProteinas">Proteínas: 0g</p>
            </div>

            <div class="container">
                <h3>Historial de hoy</h3>
                <ul id="listaRegistros"></ul>
            </div>

            <div class="container">
                <h3>Entrada rápida</h3>
                <button id="btnComida">Añadir calorías manual</button>
            </div>

            <div class="container">
                <h3>Opciones</h3>
                <button id="btnLimpiar">Limpiar registros</button>
                <button id="btnEliminarUsuario">Eliminar usuario</button>
            </div>

            <div id="badge" class="badge"></div>    
        </div>
    </div>

    

    <script src="app.js"></script>
</body>
</html>
