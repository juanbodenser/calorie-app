<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huevo Fitness</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icono-192.png">
</head>
<body>

    <div class="app">

        <div id="setup">
            <div class="header">
                <h2>Configurar usuario</h2>
            </div>

            <div class="container">
                <input id="nombre" placeholder="Nombre" autocomplete="off">
                <input id="peso" type="number" placeholder="Peso (kg)" min="1">
                <input id="objetivo" type="number" placeholder="Calorías objetivo" min="1">
                <input id="mantenimiento" type="number" placeholder="Calorías mantenimiento" min="1">
                <button id="guardarUsuario">Guardar</button>
            </div>
        </div>

        <!-- Pantalla principal (oculta inicialmente, se muestra tras configurar usuario) -->
        <div id="app" style="display: none;">

            <div id="pantallaPrincipal">
                <div class="header">
                    <h1>Huevo Fitness</h1>
                    <p id="fechaHoy"></p>
                </div>

                <div class="container" id="estadoBox">
                    <h3>Estado</h3>
                </div>
                <!-- Formulario para registrar comida -->
                <div class="container">
                    <h3>Registrar comida</h3>
                    <select id="alimento"></select>

                    <input id="gramos" type="number" placeholder="Gramos" min="1">

                    <button id="btnAgregar">Añadir comida</button>
                </div>


                <div class="container">
                    <h3>Historial de hoy</h3>
                    <ul id="listaRegistros"></ul>
                </div>

                <div class="container" id="balanceSemanal">
                    <h3>Balance semanal</h3>
                    <p id="promedio7">Promedio: 0 kcal</p>
                    <p id="balance7">Balance: 0 kcal</p>
                </div>

                <div class="container">
                    <h3>Entrada rápida</h3>
                    <button id="btnComida">Añadir calorías manual</button>
                </div>

                <!-- Opciones adicionales para testing -->
                <div class="container">
                    <h3>Opciones</h3>
                    <button id="btnLimpiar">Limpiar registros</button>
                    <button id="btnEliminarUsuario">Eliminar usuario</button>
                </div>

                <div id="badge" class="badge"></div>

            </div>

            <div id="pantallaGrafico" style="display: none;">

                <div class="container">
                    <h2>Semana</h2>
                    <canvas id="grafico"></canvas>
                    <p id="infoSemana"></p>
                    <button id="cerrarGrafico">Volver</button>
                </div>

            </div>

        </div>

    </div>

    

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
